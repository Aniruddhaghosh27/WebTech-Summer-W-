<!DOCTYPE html>
<html>
    <head>
        <title>Student Information</title>
        <link rel="stylesheet" href="style.css">    
    </head>
    <body>
        <form>
            <fieldset>
                <legend>Student Information</legend>
                <div class="formArea">
                    <div class="left">
                        <label>Full Name (Text)</label>
                        <input type="text" placeholder="Enter your full name">
                        <label>Password</label>
                        <input type="password" placeholder="Enter your secure password">
                        <label>Experiment Date</label>
                        <input type="date">
                    </div>
                    <div class="right">
                        <label>Email Address</label>
                        <input type="email" placeholder="your.email@example.com">
                        <label>Age (Number)</label>
                        <input type="number" placeholder="Enter your age">
                        <label>Phone Number</label>
                        <input type="tel" placeholder="+880 XXXXX XXXXX">
                    </div>
                </div>
                
            </fieldset>
            <div class="btn">
                    <button type="submit"
                    class="submit">SUBMIT</button>
                    <button type="reset"
                    class="clear">CLEAR</button>
                </div>
        </form>
