<!DOCTYPE html>
<html>
    <head>
        <title>Pental Shop</title>
        <link rel="stylesheet"
        href="style.css">
    </head>
    <body>
        <h1>Welcome to Pental Shop</h1>
        <h3>About this lab</h3>
        <p>
            In this lab,you will learn basic HTML structiure,formattimg text,creating simple tables and using forms for input.
        </p>

        <table>
            <tr>
                <th>Item Name</th>
                <th>Quantity</th>
                <th>Status</th>
            </tr>
            <tr>
                <td>Pencils</td>
                <td>100</td>
                <td>In Stock</td>
            </tr>
            <tr>
                <td>Notebooks</td>
                <td>50</td>
                <td>Low Stock</td>
            </tr>
            <tr>
                <td>Markers</td>
                <td>80</td>
                <td>In Stock</td>
            </tr>
        </table>
        <br>
        <form>
            <h2>Contact Information</h2>
            Name
            <input type="text">
            <br><br>
           
            Email
            <input type="email">
            <br><br>

            Message
            <br>
            <textarea rows="5" cols="30"></textarea>
            <br><br>
            <input type="Submit" value="Submit">

        </form>
       
    </body>
</html>
